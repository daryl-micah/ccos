name: Deploy

# On every push to main, SSH into the droplet, pull the latest code, and
# rebuild/restart the stack. Requires repo secrets:
#   DROPLET_HOST     - droplet IP or hostname
#   DROPLET_USER     - SSH user (e.g. root or a deploy user)
#   DROPLET_SSH_KEY  - private key authorized on the droplet
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /opt/ccos_pronto
            git pull origin main
            docker compose up -d --build
            docker image prune -f
