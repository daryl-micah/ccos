services:
  postgres:
    image: postgres:16
    container_name: ccos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ccos
      POSTGRES_PASSWORD: ccos
      POSTGRES_DB: ccos
    ports:
      # Host 5433 -> container 5432 (host 5432 is often already in use)
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ccos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
