services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ccos
      POSTGRES_PASSWORD: ccos
      POSTGRES_DB: ccos
    ports:
      # Keep exposed for DBeaver
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ccos:ccos@postgres:5432/ccos
      REDIS_URL: redis://redis:6379/0
      # Requests now go same-origin through the Next BFF, so CORS is effectively
      # unused; kept correct as belt-and-suspenders.
      CORS_ORIGINS: https://ccos.darylmicah.me
      ENV: production
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Browser hits the Next BFF same-origin (relative path).
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    environment:
      # Server-side rewrite target: Next proxies /api/v1/* to the API over the
      # internal Docker network. The API is never published to the host.
      API_INTERNAL_URL: http://api:8000
    expose:
      - "3000"
    depends_on:
      - api

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

  worker:
    build:
      context: ./apps/api
    restart: unless-stopped
    command: uv run celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://ccos:ccos@postgres:5432/ccos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./apps/api
    restart: unless-stopped
    command: uv run celery -A app.worker.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://ccos:ccos@postgres:5432/ccos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
