services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ccos
      POSTGRES_PASSWORD: ccos
      POSTGRES_DB: ccos
    ports:
      # Keep exposed for DBeaver
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ccos:ccos@postgres:5432/ccos
      # Requests now go same-origin through the Next BFF, so CORS is effectively
      # unused; kept correct as belt-and-suspenders.
      CORS_ORIGINS: https://ccos.darylmicah.me
      ENV: production
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Browser hits the Next BFF same-origin (relative path).
        NEXT_PUBLIC_API_URL: /api/v1
        # Clerk NEXT_PUBLIC_* vars are baked in at build time, so they must be
        # set in the droplet's .env before `docker compose up --build` runs.
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /
    restart: unless-stopped
    environment:
      # Route Handler proxy target: Next forwards /api/v1/* to the API over
      # the internal Docker network. The API is never published to the host.
      API_INTERNAL_URL: http://api:8000
      # Server-side Clerk key (middleware, server components). Read at
      # runtime, not baked into the build.
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    expose:
      - "3000"
    depends_on:
      - api

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
