services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ccos
      POSTGRES_PASSWORD: ccos
      POSTGRES_DB: ccos
    ports:
      # Keep exposed for DBeaver
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://ccos:ccos@postgres:5432/ccos
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://n4ttw0pcsa16go8hgkqy5qgz.168.144.81.111.sslip.io
      ENV: production
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://n4ttw0pcsa16go8hgkqy5qgz.168.144.81.111.sslip.io
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - api

  worker:
    build:
      context: ./apps/api
    restart: unless-stopped
    command: uv run celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://ccos:ccos@postgres:5432/ccos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./apps/api
    restart: unless-stopped
    command: uv run celery -A app.worker.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://ccos:ccos@postgres:5432/ccos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
